name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: Check
        run: cargo check --all-targets --all-features --locked

      - name: Check feature combinations
        run: |
          cargo check --all-targets --no-default-features --locked
          cargo check --all-targets --no-default-features --features keymap --locked
          cargo check --all-targets --no-default-features --features serde --locked

      - name: Tests (all features)
        run: cargo test --all-features --locked

      - name: Tests (core only)
        run: cargo test --no-default-features --locked

      - name: Documentation
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --all-features --no-deps --locked

      - name: Package
        run: cargo publish --dry-run --locked
